<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Insertar Addenda en CFDI (Prueba)</title>
</head>
<body>

<h2>Insertar Addenda en CFDI</h2>

<form
    action="insert_addenda_into_cfdi.php"
    method="POST"
    enctype="multipart/form-data"
>
    <label>Template ID</label><br>
    <input
        type="text"
        name="template_id"
        value="tpl_69e78e047b53e4.56878003"
        required
    ><br><br>

    <label>Archivo CFDI (XML)</label><br>
    <input
        type="file"
        name="cfdi"
        accept=".xml"
        required
    ><br><br>

    <button type="submit">Insertar Addenda</button>
</form>

</body>
</html>
