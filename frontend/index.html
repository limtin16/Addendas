<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Subir CFDI</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f7f7f7;
        }
        .card {
            background: white;
            padding: 20px;
            max-width: 500px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        button {
            margin-top: 15px;
            padding: 10px 16px;
            font-size: 16px;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Subir factura CFDI</h2>

    <form action="/addendas/backend/public/upload_cfdi.php"
          method="POST"
          enctype="multipart/form-data">

        <label>Archivo CFDI (XML):</label><br><br>
        <input type="file" name="cfdi" accept=".xml" required><br><br>

        <button type="submit">Subir y leer CFDI</button>
    </form>
</div>

</body>
</html>
